name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview Discord payload only (no release publish, no webhook post)"
        required: true
        default: true
        type: boolean
      tag_name:
        description: "Tag used for preview/manual run (e.g. v0.4.2)"
        required: false
        default: "v0.0.0-preview"
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="$GITHUB_REF_NAME"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME='${{ inputs.tag_name }}'
          fi
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v0.0.0-preview"
          fi
          VERSION="${TAG_NAME#v}"
          IS_PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Pull out the block between ## [VERSION] and the next ## heading
          BODY=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          # Write to a file to avoid quoting issues
          echo "$BODY" > release_notes.md
          echo "Generated release notes for v$VERSION"

      - name: Build plugin zip
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="GoSheets-v${VERSION}.zip"

          # Package addon contents + available root docs.
          zip -r "$ZIP_NAME" \
            addons/go_sheets \
            CHANGELOG.md \
            CREDITS.md \
            --exclude "*.import" \
            --exclude ".godot/*" \
            --exclude "*.uid"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GoSheets ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          draft: true
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          files: ${{ steps.package.outputs.zip_name }}

      - name: Build reminder message content
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          RELEASES_URL="https://github.com/${{ github.repository }}/releases"
          printf '@here\n\nGoSheets %s draft release is ready.\n\nSocial checklist:\n1) Review and publish the GitHub draft release\n2) Post Patreon update\n3) Post X/Reddit/Discord announcements\n4) Mark queue status as posted\n\n%s' \
            "$TAG" "$RELEASES_URL" > discord_content.txt

      - name: Preview reminder payload (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          jq -n --arg content "$(cat discord_content.txt)" '{content:$content}' > payload.json
          echo "Preview payload.json (manual run):"
          jq . payload.json

      - name: Notify internal socials reminder (optional)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_REMINDER }}
        run: |
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::notice::DISCORD_WEBHOOK_REMINDER not set; skipping reminder post."
            exit 0
          fi

          if [ ! -f discord_content.txt ]; then
            echo "::warning::Reminder content file missing; skipping Discord post."
            exit 0
          fi

          jq -n --arg content "$(cat discord_content.txt)" '{content:$content}' > payload.json

          HTTP_CODE=$(curl -sS -o /tmp/discord_response.txt --write-out "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL")
          echo "Discord API HTTP ${HTTP_CODE}"
          if [ -s /tmp/discord_response.txt ]; then
            echo "Response body: $(cat /tmp/discord_response.txt)"
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord reminder webhook failed with HTTP ${HTTP_CODE}. See response body above."
            exit 1
          fi
