name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: GdUnit4 test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GdUnit4 tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: "4.4"
          paths: |
            res://tests
